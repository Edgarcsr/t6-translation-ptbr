name: Package & Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package translation files
        run: |
          mkdir -p "$GITHUB_WORKSPACE/dist"
          cd "$GITHUB_WORKSPACE/translation/ptbr/localizedstrings"
          zip -j "$GITHUB_WORKSPACE/dist/translation.zip" *.str

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/translation.zip
          generate_release_notes: true
