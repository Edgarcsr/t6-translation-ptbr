name: Package & Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: tauri/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri

      - name: Install JS dependencies
        working-directory: tauri
        run: npm ci

      - name: Build Tauri app
        working-directory: tauri
        run: npm run tauri build

      - name: Package translation files
        run: |
          mkdir -p dist
          cd translation/ptbr/localizedstrings
          Compress-Archive -Path *.str -DestinationPath "$env:GITHUB_WORKSPACE\dist\translation.zip" -Force

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/translation.zip
            tauri/src-tauri/target/release/*.msi
            tauri/src-tauri/target/release/*.exe
          generate_release_notes: true
          make_latest: true
