name: Package & Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package translation files
        run: |
          mkdir -p dist
          cd translation/ptbr/localizedstrings
          zip -j ${{ github.workspace }}/dist/translation.zip *.str

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/translation.zip
          generate_release_notes: true
